<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#E87800">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="/la-cave/manifest.json">
<title>La Cave TEST – Mon Matériel</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --g:#E87800;--gd:#B05A00;--gl:#FFB347;--gg:rgba(232,120,0,0.22);
  --blk:#0F0F0F;--d1:#1A1A1A;--d2:#222;--d3:#2C2C2C;--d4:#383838;
  --tx:#F0F0F0;--tm:#888;--tdim:#555;--yel:#FFD600;--red:#E03030;
  --sh:rgba(0,0,0,0.7);--card:rgba(255,255,255,0.03);--bdr:rgba(106,176,35,0.18);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{height:100%;overflow-x:hidden;overflow-y:auto;}body{overflow:visible;min-height:100%;}
body{font-family:'Barlow',sans-serif;background:var(--blk);color:var(--tx);}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 30% at 50% 0%,rgba(106,176,35,0.1) 0%,transparent 70%);pointer-events:none;z-index:0;}

.hdr{position:sticky;top:0;z-index:200;background:var(--d1);border-bottom:3px solid var(--g);box-shadow:0 3px 20px var(--sh);}
.hdr-top{display:flex;align-items:center;gap:12px;padding:12px 14px 8px;}
.hdr-logo{width:46px;height:46px;background:var(--g);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 0 18px var(--gg);flex-shrink:0;}
.hdr-tx{flex:1;}
.hdr-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;color:var(--gl);line-height:1;}
.hdr-sub{font-size:11px;color:var(--tm);letter-spacing:1.5px;text-transform:uppercase;margin-top:1px;}
.hdr-totals{display:flex;gap:14px;}
.htot .n{font-family:'Bebas Neue',sans-serif;font-size:26px;line-height:1;color:var(--g);}
.htot .l{font-size:10px;color:var(--tm);letter-spacing:.5px;}
.hdr-search{padding:0 12px 10px;}
.srch{width:100%;background:var(--d3);border:1.5px solid var(--d4);border-radius:10px;padding:10px 14px;color:var(--tx);font-family:'Barlow',sans-serif;font-size:14px;outline:none;transition:border-color .2s;}
.srch:focus{border-color:var(--g);}
.srch::placeholder{color:var(--tdim);}

.main{padding:10px 10px 100px;position:relative;z-index:1;}

.sec-block{margin-bottom:10px;border-radius:14px;overflow:hidden;border:1.5px solid var(--bdr);box-shadow:0 4px 18px rgba(0,0,0,.5);}
.sec-hdr{display:flex;align-items:center;gap:12px;padding:12px 14px;background:linear-gradient(135deg,var(--d2) 0%,var(--d1) 100%);user-select:none;border-left:4px solid var(--g);}
.sec-hdr-tap{display:flex;align-items:center;gap:12px;flex:1;cursor:pointer;min-width:0;}
.sec-hdr-tap:active{opacity:.8;}
.sec-ico{width:40px;height:40px;background:var(--gd);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;box-shadow:0 0 10px var(--gg);}
.sec-info{flex:1;min-width:0;}
.sec-name{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sec-meta{font-size:14px;color:var(--tm);margin-top:2px;}
.sec-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.sbadge{background:var(--gd);color:var(--gl);font-family:'Bebas Neue',sans-serif;font-size:15px;padding:3px 10px;border-radius:20px;border:1px solid var(--g);letter-spacing:1px;}
.chev{color:var(--g);font-size:17px;transition:transform .3s cubic-bezier(.4,0,.2,1);}
.chev.open{transform:rotate(180deg);}
.sec-edit-btn{background:none;border:none;color:var(--tm);font-size:18px;cursor:pointer;padding:4px 6px;border-radius:6px;transition:all .18s;flex-shrink:0;}
.sec-edit-btn:active{color:var(--g);}

.sec-body{max-height:0;overflow:hidden;background:var(--d1);transition:max-height .38s cubic-bezier(.4,0,.2,1);}
.sec-body.open{max-height:5000px;}
.sec-body-in{padding:10px 10px 12px;}

.cat-row{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:10px;}
.cat-row::-webkit-scrollbar{display:none;}
.cat-pill{flex-shrink:0;padding:6px 16px;border-radius:20px;border:1.5px solid var(--d4);background:none;color:var(--tm);font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:1px;cursor:pointer;transition:all .18s;}
.cat-pill.active{background:var(--g);border-color:var(--g);color:var(--blk);}

.add-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;background:linear-gradient(135deg,var(--gd),var(--g));border:none;border-radius:10px;color:var(--blk);font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;cursor:pointer;margin-bottom:10px;box-shadow:0 3px 14px var(--gg);transition:all .18s;}
.add-btn:active{transform:scale(.97);opacity:.88;}

.empty{text-align:center;padding:28px 20px;color:var(--tdim);}
.empty .eico{font-size:44px;margin-bottom:8px;}
.empty p{font-size:13px;line-height:1.6;}

.item-card{background:var(--card);border:1px solid var(--d4);border-radius:12px;overflow:hidden;margin-bottom:8px;}
.item-card.low-stock{border-color:rgba(224,48,48,.4);}
.item-top{display:flex;align-items:center;padding:10px 12px;gap:10px;}
.item-photo{width:56px;height:56px;border-radius:9px;background:var(--d3);border:1.5px solid var(--d4);display:flex;align-items:center;justify-content:center;font-size:28px;cursor:pointer;flex-shrink:0;overflow:hidden;position:relative;}
.item-photo img{width:100%;height:100%;object-fit:cover;border-radius:7px;}
.item-photo .povl{position:absolute;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;opacity:0;font-size:16px;}
.item-photo:active .povl{opacity:1;}
.item-info{flex:1;min-width:0;}
.item-name{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ib{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;margin-top:3px;letter-spacing:.5px;text-transform:uppercase;}
.ib-out{background:rgba(106,176,35,.18);color:var(--gl);border:1px solid rgba(106,176,35,.3);}
.ib-mat{background:rgba(255,214,0,.12);color:var(--yel);border:1px solid rgba(255,214,0,.25);}
.item-desc{font-size:11px;color:var(--tm);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

.ctr-wrap{display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0;}
.ctr-row{display:flex;align-items:center;gap:6px;}
.cbtn{width:34px;height:34px;border-radius:8px;border:none;font-size:20px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .13s;}
.cbtn.m{background:var(--d3);color:var(--red);border:1.5px solid rgba(224,48,48,.3);}
.cbtn.m:active{background:var(--red);color:#fff;transform:scale(.88);}
.cbtn.p{background:var(--d3);color:var(--gl);border:1.5px solid rgba(106,176,35,.3);}
.cbtn.p:active{background:var(--g);color:var(--blk);transform:scale(.88);}
.cval{font-family:'Bebas Neue',sans-serif;font-size:28px;line-height:1;min-width:34px;text-align:center;}
.c-ok{color:var(--gl);}.c-low{color:var(--yel);}.c-zero{color:var(--red);}
.clbl{font-size:9px;color:var(--tdim);letter-spacing:.5px;}

.item-bar{display:flex;border-top:1px solid var(--d3);}
.ibar-btn{flex:1;padding:8px 4px;background:none;border:none;color:var(--tm);font-size:11px;font-family:'Barlow',sans-serif;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;border-right:1px solid var(--d3);transition:all .18s;}
.ibar-btn:last-child{border-right:none;}
.ibar-btn:active{background:var(--d3);color:var(--g);}
.ibar-ico{font-size:15px;}

/* ACCESSOIRES */
.acc-section{border-top:1px solid var(--d3);padding:8px 12px 10px;}
.acc-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--tm);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
.acc-add-btn{background:rgba(106,176,35,.15);border:1px solid rgba(106,176,35,.3);color:var(--gl);font-size:11px;padding:3px 10px;border-radius:20px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:600;letter-spacing:.5px;}
.acc-add-btn:active{background:var(--g);color:var(--blk);}
.acc-list{display:flex;flex-direction:column;gap:6px;}
.acc-item{display:flex;align-items:center;gap:8px;background:var(--d3);border-radius:8px;padding:8px 10px;border:1px solid var(--d4);}
.acc-name{flex:1;font-size:13px;font-family:'Barlow Condensed',sans-serif;font-weight:600;color:var(--tx);min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.acc-type{font-size:10px;color:var(--tm);margin-top:1px;}
.acc-ctr{display:flex;align-items:center;gap:4px;flex-shrink:0;}
.acc-btn{width:26px;height:26px;border-radius:6px;border:none;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .13s;}
.acc-btn.m{background:var(--d2);color:var(--red);border:1px solid rgba(224,48,48,.3);}
.acc-btn.m:active{background:var(--red);color:#fff;}
.acc-btn.p{background:var(--d2);color:var(--gl);border:1px solid rgba(106,176,35,.3);}
.acc-btn.p:active{background:var(--g);color:var(--blk);}
.acc-val{font-family:'Bebas Neue',sans-serif;font-size:20px;min-width:24px;text-align:center;}
.acc-del{background:none;border:none;color:rgba(224,48,48,.5);font-size:14px;cursor:pointer;padding:2px 4px;flex-shrink:0;}
.acc-del:active{color:var(--red);}

.bnav{position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--d1);border-top:2px solid var(--g);display:flex;box-shadow:0 -4px 20px var(--sh);}
.nbtn{flex:1;padding:10px 0 8px;background:none;border:none;color:var(--tm);display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;letter-spacing:.5px;font-family:'Barlow',sans-serif;cursor:pointer;transition:color .18s;position:relative;}
.nbtn.active{color:var(--g);}
.nbtn .nico{font-size:22px;line-height:1;}
/* SOUS-MENU MATÉRIEL */
.nav-submenu{position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:var(--d2);border:1.5px solid var(--g);border-radius:12px;padding:6px;min-width:140px;box-shadow:0 -4px 20px var(--sh);display:none;flex-direction:column;gap:4px;z-index:300;}
.nav-submenu.open{display:flex;}
.nav-sub-btn{padding:10px 14px;background:none;border:none;color:var(--tx);font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;border-radius:8px;text-align:left;white-space:nowrap;transition:all .18s;}
.nav-sub-btn:active{background:var(--g);color:var(--blk);}
.nav-sub-btn.active{color:var(--g);}
.nav-arrow{font-size:8px;margin-top:1px;}

.movl{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.84);backdrop-filter:blur(4px);align-items:flex-end;justify-content:center;}
.movl.open{display:flex;}
.modal{width:100%;max-width:480px;background:var(--d2);border-radius:20px 20px 0 0;border-top:3px solid var(--g);padding:20px 18px 36px;animation:slideUp .3s cubic-bezier(.4,0,.2,1);max-height:92vh;overflow-y:auto;}
@keyframes slideUp{from{transform:translateY(100%);opacity:0;}to{transform:translateY(0);opacity:1;}}
.m-handle{width:40px;height:4px;background:var(--d4);border-radius:2px;margin:-6px auto 18px;}
.m-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:var(--gl);margin-bottom:16px;}
.fg{margin-bottom:14px;}
.flbl{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--tm);margin-bottom:6px;}
.finput,.fsel,.ftxt{width:100%;background:var(--d3);border:1.5px solid var(--d4);border-radius:10px;padding:11px 14px;color:var(--tx);font-family:'Barlow',sans-serif;font-size:15px;outline:none;transition:border-color .2s;}
.finput:focus,.fsel:focus,.ftxt:focus{border-color:var(--g);}
.fsel option{background:var(--d2);color:var(--tx);}
.ftxt{min-height:70px;resize:vertical;}
.stock-row{display:flex;align-items:center;gap:10px;}
.stock-row .finput{flex:1;}
.stock-lbl{font-size:11px;color:var(--tm);flex-shrink:0;white-space:nowrap;}

.cat-sel{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;}
.csbtn{padding:10px 4px;border-radius:10px;border:2px solid var(--d4);background:none;color:var(--tm);font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;cursor:pointer;transition:all .18s;text-align:center;}
.csbtn.cs-out.active{background:rgba(106,176,35,.18);border-color:var(--g);color:var(--gl);}
.csbtn.cs-mat.active{background:rgba(255,214,0,.12);border-color:var(--yel);color:var(--yel);}
.csbtn.cs-paint.active{background:rgba(255,100,100,.12);border-color:#FF6464;color:#FF9090;}
.csbtn.cs-elec.active{background:rgba(100,180,255,.12);border-color:#64B4FF;color:#90CCFF;}
.csbtn.cs-plomb.active{background:rgba(100,200,255,.12);border-color:#64C8FF;color:#90D8FF;}
.csbtn.cs-menu.active{background:rgba(180,120,60,.15);border-color:#B4783C;color:#D4A060;}
/* IB badges nouvelles catégories */
.ib-paint{background:rgba(255,100,100,.12);color:#FF9090;border:1px solid rgba(255,100,100,.3);}
.ib-elec{background:rgba(100,180,255,.12);color:#90CCFF;border:1px solid rgba(100,180,255,.3);}
.ib-plomb{background:rgba(100,200,255,.12);color:#90D8FF;border:1px solid rgba(100,200,255,.3);}
.ib-menu{background:rgba(180,120,60,.15);color:#D4A060;border:1px solid rgba(180,120,60,.3);}
.ib-voiture{background:rgba(150,150,255,.12);color:#AAAAFF;border:1px solid rgba(150,150,255,.3);}
.csbtn.cs-voiture.active{background:rgba(150,150,255,.15);border-color:#AAAAFF;color:#CCCCFF;}
.csbtn.cs-jardin.active{background:rgba(50,200,100,.15);border-color:#32C864;color:#64E896;}
.ib-jardin{background:rgba(50,200,100,.12);color:#64E896;border:1px solid rgba(50,200,100,.3);}
/* cat-sel utilise grid - pas besoin de flex sur csbtn */
.nav-sub-btn{padding:10px 14px;background:none;border:none;color:var(--tx);font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;border-radius:8px;text-align:left;white-space:nowrap;transition:all .18s;}
.nav-sub-btn:active{background:var(--g);color:var(--blk);}
.nav-sub-btn.active{color:var(--g);background:rgba(106,176,35,.1);}
/* ACHATS VIEW */
.achats-view{display:none;padding:10px 10px 100px;position:relative;z-index:1;}
.achats-view.open{display:block;}
.achat-card{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;}
.achat-card.done{opacity:.5;}
.achat-check{width:28px;height:28px;border-radius:8px;border:2px solid var(--g);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;transition:all .18s;}
.achat-check.checked{background:var(--g);border-color:var(--g);}
.achat-info{flex:1;min-width:0;}
.achat-name{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:var(--tx);}
.achat-cat{font-size:11px;color:var(--tm);margin-top:2px;}
.achat-del{background:none;border:none;color:rgba(224,48,48,.5);font-size:18px;cursor:pointer;padding:4px;}
.achat-add-bar{display:flex;gap:8px;margin-bottom:12px;}
.achat-add-bar .finput{flex:1;}
.achat-cat-sel{background:var(--d3);border:1.5px solid var(--d4);border-radius:10px;padding:11px 10px;color:var(--tx);font-family:'Barlow',sans-serif;font-size:13px;outline:none;flex-shrink:0;}
.achat-add-btn2{padding:11px 16px;background:linear-gradient(135deg,var(--gd),var(--g));border:none;border-radius:10px;color:var(--blk);font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;cursor:pointer;flex-shrink:0;}
.achat-filter-row{display:flex;gap:8px;margin-bottom:10px;overflow-x:auto;scrollbar-width:none;}
.achat-filter-row::-webkit-scrollbar{display:none;}
/* MESURES */
.mesures-row{display:flex;gap:8px;}
.mesures-row .finput{flex:1;}

.photo-zone{display:flex;flex-direction:column;gap:10px;}
.photo-slot{background:var(--d3);border:2px dashed var(--d4);border-radius:10px;aspect-ratio:1;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;position:relative;transition:border-color .2s;}
.photo-slot:active{border-color:var(--g);}
.photo-slot-inner{display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:28px;width:100%;height:100%;}
.photo-slot img{width:100%;height:100%;object-fit:cover;border-radius:8px;}
.photo-slot-del{position:absolute;top:4px;right:4px;background:rgba(224,48,48,.85);border:none;border-radius:6px;color:#fff;font-size:14px;cursor:pointer;padding:2px 6px;z-index:10;}
.photo-slot-del-ext{width:100%;padding:5px;background:none;border:1px solid rgba(224,48,48,.3);border-radius:6px;color:var(--red);font-size:11px;cursor:pointer;margin-top:3px;font-family:'Barlow Condensed',sans-serif;font-weight:600;}
.photo-btn-action{flex:1;padding:10px;background:var(--d3);border:1.5px solid var(--d4);border-radius:8px;color:var(--tx);font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;transition:all .18s;}
.photo-btn-action:active{border-color:var(--g);color:var(--gl);}
/* Vue photo dans card */
.card-photos{display:flex;gap:4px;padding:6px 12px;}
.card-photo-mini{width:52px;height:52px;border-radius:7px;object-fit:cover;cursor:pointer;border:1px solid var(--d4);}

/* ACCESSOIRES MODAL */
.acc-modal-list{display:flex;flex-direction:column;gap:8px;margin-bottom:10px;}
.acc-modal-item{display:flex;align-items:center;gap:8px;background:var(--d3);border-radius:8px;padding:8px 10px;}
.acc-modal-name{flex:1;font-size:13px;color:var(--tx);}
.acc-modal-del{background:none;border:none;color:var(--red);font-size:16px;cursor:pointer;}
.acc-add-row{display:flex;gap:8px;}
.acc-add-row .finput{flex:2;}
.acc-type-sel{flex:1;background:var(--d3);border:1.5px solid var(--d4);border-radius:10px;padding:11px 8px;color:var(--tx);font-family:'Barlow',sans-serif;font-size:13px;outline:none;}
.acc-add-sub{width:100%;padding:10px;background:rgba(106,176,35,.15);border:1.5px solid rgba(106,176,35,.3);border-radius:8px;color:var(--gl);font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;margin-top:6px;}
.acc-add-sub:active{background:var(--g);color:var(--blk);}

.mbtns{display:flex;gap:10px;margin-top:20px;}
.btn-cancel{flex:1;padding:13px;background:var(--d3);border:1.5px solid var(--d4);border-radius:10px;color:var(--tm);font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:1px;cursor:pointer;}
.btn-save{flex:2;padding:13px;background:linear-gradient(135deg,var(--gd),var(--g));border:none;border-radius:10px;color:var(--blk);font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:1px;cursor:pointer;box-shadow:0 3px 14px var(--gg);}
.btn-save:active{opacity:.85;transform:scale(.98);}

/* CONTENEURS */
.icon-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-top:8px;}
.ico-btn{background:var(--d3);border:2px solid var(--d4);border-radius:10px;font-size:22px;padding:8px 0;cursor:pointer;text-align:center;transition:all .18s;}
.ico-btn.active{border-color:var(--g);background:rgba(106,176,35,.18);}
.type-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}

<script>
// ══════════════════════════════════════════════
// STOCKAGE INDEXEDDB — fiable, ne s'efface pas
// ══════════════════════════════════════════════
const DB_NAME = 'LaCaveDB';
const DB_VER  = 1;
let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('data')) {
        d.createObjectStore('data', { keyPath: 'key' });
      }
    };
    req.onsuccess = e => { db = e.target.result; resolve(db); };
    req.onerror   = e => reject(e);
  });
}

function dbSet(key, value) {
  return new Promise((resolve, reject) => {
    const tx  = db.transaction('data', 'readwrite');
    const st  = tx.objectStore('data');
    const req = st.put({ key, value: JSON.stringify(value) });
    req.onsuccess = () => resolve();
    req.onerror   = e => reject(e);
  });
}

function dbGet(key) {
  return new Promise((resolve, reject) => {
    const tx  = db.transaction('data', 'readonly');
    const st  = tx.objectStore('data');
    const req = st.get(key);
    req.onsuccess = e => {
      const r = e.target.result;
      resolve(r ? JSON.parse(r.value) : null);
    };
    req.onerror = e => reject(e);
  });
}

  etagere: ['📚','📋','🪤','📐','📏','🔩','🪛','🔧','⚙️','🛠️','🗜️','📌'],
  autre:   ['📦','🪣','🧺','🗑️','♻️','🎁','💼','🧳','🪝','🔑','🏷️','📎'],
};

let S = { containers:[], items:[], open:{}, navFilter:'all' };
let editId=null, currentPhoto=null, ctrEditId=null, selIcon='🧰', selTypeKey='caisse';
let modalAccs=[];
let saveTimer=null;

async function loadState() {
  // Forcer la persistance du stockage sur Android
  if(navigator.storage && navigator.storage.persist) {
    const persistent = await navigator.storage.persist();
    console.log('Storage persistent:', persistent);
  }
  await openDB();
  // Essaie IndexedDB d'abord
  const saved = await dbGet('state');
  if (saved) {
    S = Object.assign(S, saved);
  } else {
    // Essaie TOUS les localStorage comme fallback
    try {
      const old = localStorage.getItem('cave-v5') ||
                  localStorage.getItem('cave-backup') ||
                  localStorage.getItem('cave-v4') ||
                  localStorage.getItem('cave-v3');
      if (old) {
        S = Object.assign(S, JSON.parse(old));
        await dbSet('state', S); // Migre vers IndexedDB
        toast('✅ Données récupérées depuis la sauvegarde locale !');
      }
    } catch(e){}
  }
  // Compresse les photos existantes si pas encore fait
  if (S.items && !S.photosCompressed) {
    let pending = S.items.filter(i => i.photo && i.photo.length > 50000).length;
    if (pending > 0) {
      let done = 0;
      S.items.forEach(it => {
        if (it.photo && it.photo.length > 50000) {
          compressPhoto(it.photo, compressed => {
            it.photo = compressed;
            done++;
            if (done === pending) { S.photosCompressed = true; persist(); render(); }
          });
        }
      });
    }
  }
  if (!S.containers||!S.containers.length) {
    S.containers=[{id:'c1',name:'Caisse 1',icon:'🧰'},{id:'c2',name:'Caisse 2',icon:'📦'},{id:'m1',name:'Meuble 1',icon:'🗄️'}];
    S.open={c1:true,c2:true,m1:true};
  }
  if (!S.items) S.items=[];
  if (!S.open)  S.open={};
  render();
}

let autoSaveTimer = null;

function persist() {
  const data = JSON.stringify(S);
  // Sauvegarde dans IndexedDB
  dbSet('state', S).catch(()=>{});
  // Double sauvegarde dans localStorage
  try { localStorage.setItem('cave-v5', data); } catch(e){}
  try { localStorage.setItem('cave-backup', data); } catch(e){}
  // Indicateur visuel
  showSaveIndicator();
  // Auto-sauvegarde JSON toutes les 5 minutes si modifié
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(() => autoSaveJSON(), 2 * 60 * 1000);
}

function autoSaveJSON() {
  try {
    const data = JSON.stringify(S, null, 2);
    const base64 = btoa(unescape(encodeURIComponent(data)));
    const dataUrl = 'data:application/json;base64,' + base64;
    const date = new Date().toISOString().slice(0,10);
    const a = document.createElement('a');
    a.href = dataUrl;
    a.download = `la-cave-test-auto-${date}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  } catch(e) {}
}

function showSaveIndicator() {
  const el = document.getElementById('save-ind');
  el.classList.add('show');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => el.classList.remove('show'), 1500);
}

function render() {

          <div class="sec-info">
            <div class="sec-name">${c.name}</div>

          </div>
          <div class="sec-right">
            <span class="sbadge">${tot}</span>
            <span class="chev ${isOpen?'open':''}">▼</span>
          </div>
        </div>
        <button class="sec-edit-btn" onclick="openCtrModal('${c.id}')">✏️</button>
      </div>
      <div class="sec-body ${isOpen?'open':''}">
        <div class="sec-body-in">
          <div class="cat-row">
            <button class="cat-pill active" onclick="localFilter(event,'all','${c.id}')">Tout</button>
            <button class="cat-pill" onclick="localFilter(event,'Outillage','${c.id}')">🔨 Outillage</button>
            <button class="cat-pill" onclick="localFilter(event,'Matériel','${c.id}')">📦 Matériel</button>
            <button class="cat-pill" onclick="localFilter(event,'Peinture','${c.id}')">🎨 Peinture</button>
            <button class="cat-pill" onclick="localFilter(event,'Électricité','${c.id}')">⚡ Électricité</button>
            <button class="cat-pill" onclick="localFilter(event,'Plomberie','${c.id}')">🔧 Plomberie</button>

            <button class="cat-pill" onclick="localFilter(event,'Voiture','${c.id}')">🚗 Voiture</button>
            <button class="cat-pill" onclick="localFilter(event,'Jardin','${c.id}')">🪴 Jardin</button>
          </div>
          <button class="add-btn" onclick="openModal('${c.id}')">＋ &nbsp;Ajouter dans ${c.name}</button>
          <div id="list-${c.id}">`;

    if (visible.length===0) {
      html+=`<div class="empty"><div class="eico">🛠️</div><p>Aucun article ici.<br>Appuyez sur <b>Ajouter</b>.</p></div>`;
    } else {
      visible.forEach(it=>{ html+=cardHTML(it); });
    }
    html+=`</div></div></div></div>`;
  });

  html+=`<button class="manage-btn" onclick="openCtrModal(null)">🗂️ &nbsp;Gérer les caisses &amp; meubles</button>`;
  html+=`<div class="backup-section">
    <button class="backup-btn export" onclick="exportData()">💾 Sauvegarder</button>
    <button class="backup-btn import" onclick="document.getElementById('import-input').click()">📂 Restaurer</button>
  </div>`;

  document.getElementById('main').innerHTML=html;
  document.getElementById('total-items').textContent=S.items.length;

  const cc=it.stock<=(it.minS||1)?'low-stock':'';

  const photos=(it.photos&&it.photos.length)?it.photos:(it.photo?[it.photo]:[]);
  const ph=photos.length?`<img src="${photos[0]}" alt=""><div class="povl">🔍</div>`:(it.cat==='Outillage'?'🔨':'📦');
  const accs=it.accessories||[];

    <div class="acc-section">

            <button class="acc-btn p" onclick="chgAcc('${it.id}',${i},1)">+</button>
          </div>
          <button class="acc-del" onclick="delAcc('${it.id}',${i})">🗑</button>

  return `<div class="item-card ${cc}" id="card-${it.id}">
    <div class="item-top">

      <div class="item-info">
        <div class="item-name">${it.name}</div>
        <span class="ib ${cls}">${it.cat}</span>

        ${it.longueur?`<div class="item-desc">📏 ${it.longueur}×${it.largeur}×${it.epaisseur} cm</div>`:''}
      </div>
      <div class="ctr-wrap">
        <div class="ctr-row">

    ${photos.length>1?`<div class="card-photos">${photos.slice(1).map((p,i)=>`<img class="card-photo-mini" src="${p}" onclick="viewPhotoFull('${it.id}',${i+1})">`).join('')}</div>`:''}
    ${accHtml}
    <div class="item-bar">
      <button class="ibar-btn" onclick="useIt('${it.id}')"><span class="ibar-ico">✅</span>Utiliser</button>

}

// ACCESSOIRES

function chgAcc(itemId,idx,d) {
  const it=S.items.find(i=>i.id===itemId); if(!it||!it.accessories) return;
  it.accessories[idx].stock=Math.max(0,(it.accessories[idx].stock||0)+d);
  persist();
  const el=document.getElementById(`av-${itemId}-${idx}`);
  if(el){ const s=it.accessories[idx].stock; el.className='acc-val '+(s===0?'c-zero':s<=1?'c-low':'c-ok'); el.textContent=s; }
  if(it.accessories[idx].stock===0) toast(`⚠️ ${it.accessories[idx].name} — épuisé !`);
}

function delAcc(itemId,idx) {
  const it=S.items.find(i=>i.id===itemId); if(!it) return;
  it.accessories.splice(idx,1); persist(); render();
}

function quickAddAcc(itemId) {
  const name=prompt('Nom de l\'accessoire/lame :'); if(!name||!name.trim()) return;
  const it=S.items.find(i=>i.id===itemId); if(!it) return;
  if(!it.accessories) it.accessories=[];
  it.accessories.push({name:name.trim(),type:'Accessoire',stock:1});
  persist(); render(); toast('✅ Accessoire ajouté');
}

function addAccToModal() {
  const name=document.getElementById('acc-new-name').value.trim();
  const type=document.getElementById('acc-new-type').value;
  if(!name){ toast('⚠️ Saisissez un nom'); return; }
  modalAccs.push({name,type,stock:1});
  document.getElementById('acc-new-name').value='';
  renderModalAccs();
}

function renderModalAccs() {
  const el=document.getElementById('acc-modal-list'); if(!el) return;
  el.innerHTML=modalAccs.map((a,i)=>`
    <div class="acc-modal-item">
      <span>🔩</span>
      <span class="acc-modal-name">${a.name} <span style="color:var(--tm);font-size:11px">(${a.type})</span></span>
      <button class="acc-modal-del" onclick="removeModalAcc(${i})">🗑</button>
    </div>`).join('');
}

function removeModalAcc(i) { modalAccs.splice(i,1); renderModalAccs(); }

// ══════════════════════════════════════════════
function chgStock(id,d) {
  const it=S.items.find(i=>i.id===id); if(!it) return;
  it.stock=Math.max(0,(it.stock||0)+d); persist();
  const el=document.getElementById(`cv-${id}`);
  if(el){ el.className='cval '+(it.stock===0?'c-zero':it.stock<=(it.minS||1)?'c-low':'c-ok'); el.textContent=it.stock; }
  const card=document.getElementById(`card-${id}`);
  if(card) card.classList.toggle('low-stock',it.stock<=(it.minS||1));
  document.getElementById('total-stock').textContent=S.items.reduce((a,i)=>a+(i.stock||0),0);
  if(it.stock===0) toast(`⚠️ ${it.name} — Stock épuisé !`);
  else if(it.stock<=(it.minS||1)) toast(`🟡 ${it.name} — Stock bas`);
}

function useIt(id){ chgStock(id,-1); toast('✅ Article utilisé'); }

  document.getElementById('mesures-section').style.display=showMes?'':'none';
  selCat(it.cat); fillCtrSelect(it.cid); setPhotoUI(it.photos||it.photo||null); renderModalAccs();

}

function closeModal(){ document.getElementById('add-modal').classList.remove('open'); }

function fillCtrSelect(sel) {
  const s=document.getElementById('f-ctr');
  s.innerHTML='<option value="">-- Choisir --</option>';
  S.containers.forEach(c=>{ const o=document.createElement('option'); o.value=c.id; o.textContent=`${c.icon} ${c.name}`; if(c.id===sel) o.selected=true; s.appendChild(o); });

function selCat(cat) {
  ['btn-out','btn-mat','btn-paint','btn-elec','btn-plomb','btn-menu'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.classList.remove('active');
  });
  const map={'Outillage':'btn-out','Matériel':'btn-mat','Peinture':'btn-paint','Électricité':'btn-elec','Plomberie':'btn-plomb','Menuiserie':'btn-menu','Voiture':'btn-voiture','Jardin':'btn-jardin'};
  const btn=document.getElementById(map[cat]); if(btn) btn.classList.add('active');
  const acc=document.getElementById('acc-section-modal');
  if(acc) acc.style.display=cat==='Outillage'?'':'none';
}
function getCat(){
  const map={'btn-out':'Outillage','btn-mat':'Matériel','btn-paint':'Peinture','btn-elec':'Électricité','btn-plomb':'Plomberie','btn-menu':'Menuiserie','btn-voiture':'Voiture','btn-jardin':'Jardin'};
  for(const [id,cat] of Object.entries(map)){
    const el=document.getElementById(id);
    if(el&&el.classList.contains('active')) return cat;
  }
  return 'Outillage';
}

function saveItem() {
  const name=document.getElementById('f-name').value.trim();
  const cid=document.getElementById('f-ctr').value;
  if(!name){ toast('⚠️ Veuillez saisir un nom'); return; }
  if(!cid){ toast('⚠️ Choisissez un conteneur'); return; }
  const cat=getCat();
  const item={
    id: editId||'i'+Date.now(), name, cid,
    desc:  document.getElementById('f-desc').value.trim(),
    stock: parseInt(document.getElementById('f-stock').value)||0,
    minS:  parseInt(document.getElementById('f-min').value)||1,
    cat,
    photos: currentPhotos.filter(Boolean),
    photo: currentPhotos[0]||null,
    accessories: cat==='Outillage'?[...modalAccs]:[],
    longueur: document.getElementById('f-longueur')?.value||null,
    largeur:  document.getElementById('f-largeur')?.value||null,
    epaisseur:document.getElementById('f-epaisseur')?.value||null,
  };
  if(editId){ const i=S.items.findIndex(x=>x.id===editId); if(i>=0) S.items[i]=item; }
  else { S.items.push(item); }
  persist(); render(); closeModal();
  toast(editId?'✅ Article modifié':'✅ Article ajouté');
}

function delItem(id) {
  if(!confirm('Supprimer cet article ?')) return;
  S.items=S.items.filter(i=>i.id!==id); persist(); render(); toast('🗑️ Supprimé');
}

// ══════════════════════════════════════════════
// PHOTOS (multi - max 4)
// ══════════════════════════════════════════════
let currentPhotos = [null,null,null,null];

function nextEmptySlot(){
  return currentPhotos.findIndex(p=>p===null);
}

function compressPhoto(dataUrl, callback) {
  const img = new Image();
  img.onload = function() {
    const MAX = 800;
    let w = img.width, h = img.height;
    if (w > MAX || h > MAX) {
      if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
      else { w = Math.round(w * MAX / h); h = MAX; }
    }
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, w, h);
    callback(canvas.toDataURL('image/jpeg', 0.6));
  };
  img.src = dataUrl;
}

function triggerPhotoSlot(slot, mode) {
  // Utilise les vrais inputs HTML via labels - plus fiable sur Android
  if(mode==='camera'){
    document.getElementById('ph-camera').click();
    return;
  }
  const inp = document.getElementById('ph-input-'+slot);
  if(inp) inp.click();
}

function handlePhotoCamera(e){
  // Trouve le premier slot vide
  const slot = nextEmptySlot();
  if(slot<0){ toast('⚠️ 4 photos maximum !'); return; }
  handlePhotoSlot(e, slot);
}

// ══════════════════════════════════════════════
// CROP — système canvas fiable
// ══════════════════════════════════════════════
let cropSlot = null;
let cropImg = new Image();
let cropState = { x:0, y:0, zoom:100, rot:0 };
let cropDrag = { active:false, lastX:0, lastY:0 };

function handlePhotoSlot(e, slot) {
  const f=e.target.files&&e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=ev=>{ openCropModal(ev.target.result, slot); };
  r.readAsDataURL(f);
  e.target.value='';
}

function openCropModal(src, slot) {
  cropSlot = slot;
  cropState = { x:0, y:0, zoom:100, rot:0 };
  document.getElementById('crop-zoom').value = 100;
  document.getElementById('crop-rot').value = 0;
  document.getElementById('crop-zoom-val').textContent = '100%';
  document.getElementById('crop-rot-val').textContent = '0°';
  document.getElementById('crop-modal').style.display = 'flex';

  cropImg = new Image();
  cropImg.onload = () => {
    // Zoom initial pour remplir le container
    const container = document.getElementById('crop-container');
    const cW = container.offsetWidth;
    const cH = container.offsetHeight;
    const scaleW = cW / cropImg.width;
    const scaleH = cH / cropImg.height;
    const initZoom = Math.max(scaleW, scaleH) * 100;
    cropState.zoom = Math.round(initZoom);
    document.getElementById('crop-zoom').value = cropState.zoom;
    document.getElementById('crop-zoom-val').textContent = cropState.zoom + '%';
    drawCrop();
  };
  cropImg.src = src;

  // Events tactiles
  const container = document.getElementById('crop-container');
  container.ontouchstart = e2 => {
    if(e2.touches.length===1){
      e2.preventDefault();
      cropDrag.active=true;
      cropDrag.lastX=e2.touches[0].clientX;
      cropDrag.lastY=e2.touches[0].clientY;
    }
  };
  container.ontouchmove = e2 => {
    if(!cropDrag.active||e2.touches.length!==1) return;
    e2.preventDefault();
    const dx = e2.touches[0].clientX - cropDrag.lastX;
    const dy = e2.touches[0].clientY - cropDrag.lastY;
    cropDrag.lastX = e2.touches[0].clientX;
    cropDrag.lastY = e2.touches[0].clientY;
    cropState.x += dx;
    cropState.y += dy;
    drawCrop();
  };
  container.ontouchend = () => { cropDrag.active=false; };
  // Events souris
  container.onmousedown = e2 => {
    cropDrag.active=true;
    cropDrag.lastX=e2.clientX;
    cropDrag.lastY=e2.clientY;
  };
  container.onmousemove = e2 => {
    if(!cropDrag.active) return;
    cropState.x += e2.clientX - cropDrag.lastX;
    cropState.y += e2.clientY - cropDrag.lastY;
    cropDrag.lastX = e2.clientX;
    cropDrag.lastY = e2.clientY;
    drawCrop();
  };
  container.onmouseup = () => { cropDrag.active=false; };
}

function drawCrop() {
  const container = document.getElementById('crop-container');
  const canvas = document.getElementById('crop-canvas');
  const cW = container.offsetWidth;
  const cH = container.offsetHeight;
  canvas.width = cW;
  canvas.height = cH;
  const ctx = canvas.getContext('2d');
  cropState.zoom = parseInt(document.getElementById('crop-zoom').value);
  cropState.rot  = parseInt(document.getElementById('crop-rot').value);
  document.getElementById('crop-zoom-val').textContent = cropState.zoom + '%';
  document.getElementById('crop-rot-val').textContent  = cropState.rot + '°';
  ctx.clearRect(0,0,cW,cH);
  ctx.save();
  ctx.translate(cW/2 + cropState.x, cH/2 + cropState.y);
  ctx.rotate(cropState.rot * Math.PI/180);
  ctx.scale(cropState.zoom/100, cropState.zoom/100);
  ctx.drawImage(cropImg, -cropImg.width/2, -cropImg.height/2);
  ctx.restore();
}

function cropReset() {
  cropState = { x:0, y:0, zoom:100, rot:0 };
  const container = document.getElementById('crop-container');
  const cW = container.offsetWidth;
  const cH = container.offsetHeight;
  const scaleW = cW / cropImg.width;
  const scaleH = cH / cropImg.height;
  cropState.zoom = Math.round(Math.max(scaleW, scaleH) * 100);
  document.getElementById('crop-zoom').value = cropState.zoom;
  document.getElementById('crop-rot').value = 0;
  drawCrop();
}

function closeCropModal() {
  document.getElementById('crop-modal').style.display='none';
}

function confirmCrop() {
  const container = document.getElementById('crop-container');
  const cW = container.offsetWidth;
  const cH = container.offsetHeight;
  const canvas = document.createElement('canvas');
  canvas.width  = cW * 2; // 2x pour meilleure qualité
  canvas.height = cH * 2;
  const ctx = canvas.getContext('2d');
  ctx.scale(2,2);
  ctx.save();
  ctx.translate(cW/2 + cropState.x, cH/2 + cropState.y);
  ctx.rotate(cropState.rot * Math.PI/180);
  ctx.scale(cropState.zoom/100, cropState.zoom/100);
  ctx.drawImage(cropImg, -cropImg.width/2, -cropImg.height/2);
  ctx.restore();
  const result = canvas.toDataURL('image/jpeg', 0.88);
  compressPhoto(result, compressed => {
    currentPhotos[cropSlot] = compressed;
    updateSlotUI(cropSlot, compressed);
  });
  closeCropModal();
}

function updateSlotUI(slot, src) {
  const inner=document.getElementById(`slot-inner-${slot}`);
  if(!inner) return;
  if(src){
    inner.innerHTML=`<img src="${src}" style="width:100%;height:100%;object-fit:cover;border-radius:8px;">`;
    const slotEl=document.getElementById(`slot-${slot}`);
    if(slotEl){
      slotEl.style.borderColor='var(--g)';
      // Bouton supprimer à côté du slot
      let delBtn=document.getElementById(`slot-del-${slot}`);
      if(!delBtn){
        delBtn=document.createElement('button');
        delBtn.id=`slot-del-${slot}`;
        delBtn.className='photo-slot-del-ext';
        delBtn.textContent='✕ Supprimer';
        delBtn.onclick=()=>clearSlot(slot);
        slotEl.parentNode.insertBefore(delBtn, slotEl.nextSibling);
      }
    }
  } else {
    inner.innerHTML=`📷<div style="font-size:10px;color:var(--tdim);margin-top:4px;">Photo ${slot+1}</div>`;
    const slotEl=document.getElementById(`slot-${slot}`);
    if(slotEl) slotEl.style.borderColor='';
    const delBtn=document.getElementById(`slot-del-${slot}`);
    if(delBtn) delBtn.remove();
  }
}

function clearSlot(slot){
  currentPhotos[slot]=null;
  updateSlotUI(slot,null);
}

function resetPhotoUI(){
  currentPhotos=[null,null,null,null];
  for(let i=0;i<4;i++) updateSlotUI(i,null);
}

function setPhotoUI(photos){
  currentPhotos=[null,null,null,null];
  if(!photos) return;
  if(typeof photos==='string'){
    currentPhotos[0]=photos;
    updateSlotUI(0,photos);
    return;
  }
  if(Array.isArray(photos)){
    photos.forEach((p,i)=>{ if(p&&i<4){ currentPhotos[i]=p; updateSlotUI(i,p); } });
  }
}

function exportData() {
  const data = JSON.stringify(S, null, 2);
  const date = new Date().toISOString().slice(0,10);
  const fileName = `la-cave-${date}.json`;

  // Crée une URL data: base64 — interceptée par le DownloadListener Java sur APK
  // et fonctionne aussi dans Chrome directement
  const base64 = btoa(unescape(encodeURIComponent(data)));
  const dataUrl = 'data:application/json;base64,' + base64;
  const a = document.createElement('a');
  a.href = dataUrl;
  a.download = fileName;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  toast('💾 Sauvegarde en cours...');
}

document.getElementById('import-input').addEventListener('change',function(e){
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=ev=>{
    try {
      let text = ev.target.result;
      // Si c'est un ArrayBuffer, convertir en texte
      if(text instanceof ArrayBuffer) {
        text = new TextDecoder('utf-8').decode(text);
      }
      const data=JSON.parse(text);
      if(!data.containers||!data.items){ toast('❌ Fichier invalide'); return; }
      if(confirm('Restaurer ? Les données actuelles seront remplacées.')){
        S=data; persist(); render(); toast('✅ Données restaurées !');
      }
    } catch(err){ 
      console.log('Restore error:', err);
      toast('❌ Erreur lecture fichier'); 
    }
  };
  r.onerror = () => toast('❌ Impossible de lire le fichier');
  // Essayer les deux méthodes
  try {
    r.readAsText(f, 'UTF-8');
  } catch(err) {
    r.readAsArrayBuffer(f);
  }
  e.target.value='';
});

function switchCtrTab(tab) {
  const iconSec  = document.getElementById('ctr-icon-section');

function handleCtrPhoto(e) {
  const f=e.target.files&&e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=ev=>{
    compressPhoto(ev.target.result, compressed => {
      ctrCurrentPhoto=compressed;
      const prev=document.getElementById('ctr-photo-preview');
      if(prev) prev.innerHTML=`<img src="${compressed}" style="width:100%;height:100%;object-fit:cover;border-radius:8px;">`;
    });
  };
  r.readAsDataURL(f);
  e.target.value='';
}

  const prev=document.getElementById('ctr-photo-preview');
  if(prev) prev.innerHTML='📷';
}

function saveCtr() {
  const name=document.getElementById('ctr-name').value.trim(); if(!name){ toast('⚠️ Saisissez un nom'); return; }
  const photoTab = document.getElementById('ctr-photo-section').style.display!=='none';
  const finalPhoto = photoTab ? ctrCurrentPhoto : null;
  if(ctrEditId){
    const ct=S.containers.find(x=>x.id===ctrEditId);
    if(ct){ ct.name=name; ct.icon=selIcon; if(finalPhoto) ct.photo=finalPhoto; else if(!photoTab) ct.photo=null; }
    toast(`✅ ${name} modifié`);
  } else {
    const id='c'+Date.now();
    S.containers.push({id,name,icon:selIcon,photo:finalPhoto});
    S.open[id]=true;
    toast(`✅ ${name} ajouté`);
  }
  persist(); ctrEditId=null; ctrCurrentPhoto=null;
  document.getElementById('ctr-name').value='';
  document.getElementById('ctr-form-title').textContent='Ajouter';
  document.getElementById('ctr-save-btn').textContent='＋ Ajouter';
  switchCtrTab('icon');
  renderCtrList(); render();
}
function delCtr(id) {
  const c=S.containers.find(x=>x.id===id); const cnt=S.items.filter(i=>i.cid===id).length;
  if(!confirm(`Supprimer "${c?.name}"${cnt>0?` et ses ${cnt} articles`:''}?`)) return;
  S.containers=S.containers.filter(x=>x.id!==id); S.items=S.items.filter(i=>i.cid!==id);
  persist(); renderCtrList(); render(); toast('🗑️ Supprimé');
}

const NOMS_MENUISERIE = ['Planche pin','Planche chêne','Planche MDF','Planche OSB','Contre-plaqué','Tasseau','Moulure','Parquet','Lame de terrasse','Porte','Fenêtre','Plinthe','Quart de rond','Charnière','Poignée','Serrure','Verrou'];

function getNomsByCategory() {
  const cat = getCat();
  if(cat==='Outillage') return NOMS_OUTILLAGE;
  if(cat==='Matériel') return NOMS_MATERIEL;
  if(cat==='Peinture') return NOMS_PEINTURE;
  if(cat==='Électricité') return NOMS_ELECTRIQUE;
  if(cat==='Plomberie') return NOMS_PLOMBERIE;
  if(cat==='Menuiserie') return NOMS_MENUISERIE;
  if(cat==='Voiture') return NOMS_VOITURE;
  if(cat==='Jardin') return NOMS_JARDIN;
  return [];
}

function filterNameDropdown(q) {
  q=(q||'').toLowerCase();
  const dd=document.getElementById('name-dropdown');
  const noms=getNomsByCategory();
  const filtered=q ? noms.filter(n=>n.toLowerCase().startsWith(q)||n.toLowerCase().includes(q)) : noms.slice(0,20);
  if(!filtered.length){ dd.style.display='none'; return; }
  dd.innerHTML=filtered.map(n=>`<div onclick="selectName('${n.replace(/'/g,"\'")}');" style="padding:10px 14px;cursor:pointer;font-size:14px;border-bottom:1px solid var(--d4);color:var(--tx);">${n}</div>`).join('');
  dd.style.display='block';
}

function showNameDropdown() {
  const dd=document.getElementById('name-dropdown');
  const noms=getNomsByCategory().slice(0,20);
  dd.innerHTML=noms.map(n=>`<div onclick="selectName('${n.replace(/'/g,"\'")}');" style="padding:10px 14px;cursor:pointer;font-size:14px;border-bottom:1px solid var(--d4);color:var(--tx);">${n}</div>`).join('');
  dd.style.display='block';
}

function showNameDropdownAndScroll() {
  showNameDropdown();
  setTimeout(()=>{
    const inp=document.getElementById('f-name');
    if(inp) inp.scrollIntoView({behavior:'smooth',block:'center'});
  }, 350);
}

function selectName(name) {
  document.getElementById('name-dropdown').style.display='none';
  document.getElementById('f-name').value=name;
  // Afficher mesures SEULEMENT si planche/panneau/tasseau/poutre
  const showMes=/planche|panneau|tasseau|poutre/i.test(name);
  document.getElementById('mesures-section').style.display=showMes?'':'none';
}

// Fermer dropdown si clic ailleurs
document.addEventListener('click',function(e){
  if(!e.target.closest('#name-dropdown')&&e.target.id!=='f-name'){
    const dd=document.getElementById('name-dropdown');
    if(dd) dd.style.display='none';
  }
});

// ══════════════════════════════════════════════
// ACHATS
// ══════════════════════════════════════════════
const ACHATS_CATS = ['Outillage','Matériel','Peinture','Électricité','Plomberie','Menuiserie','Voiture','Jardin'];
const ACHATS_NOMS = {
  'Outillage': NOMS_OUTILLAGE,
  'Matériel': NOMS_MATERIEL,
  'Peinture': NOMS_PEINTURE,
  'Électricité': NOMS_ELECTRIQUE,
  'Plomberie': NOMS_PLOMBERIE,
  'Menuiserie': NOMS_MENUISERIE,
  'Voiture': NOMS_VOITURE,
  'Jardin': NOMS_JARDIN,
};
let achatFilter = 'all';

function renderAchats() {
  document.getElementById('achats-view').classList.add('open');
  if(!S.achats) S.achats=[];
  const filtered = achatFilter==='all' ? S.achats : S.achats.filter(a=>a.cat===achatFilter);
  const total=S.achats.length, done=S.achats.filter(a=>a.done).length;

  let html=`<div style="padding-bottom:8px;">
    <div style="font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;color:var(--gl);margin-bottom:4px;">🛒 Liste d'achats</div>
    <div style="font-size:11px;color:var(--tm);">${done}/${total} achetés</div>
  </div>
  <div class="achat-filter-row">
    <button class="cat-pill ${achatFilter==='all'?'active':''}" onclick="setAchatFilter('all')">Tout</button>
    ${ACHATS_CATS.map(cat=>`<button class="cat-pill ${achatFilter===cat?'active':''}" onclick="setAchatFilter('${cat}')">${cat}</button>`).join('')}
  </div>
  <div class="achat-add-bar">
    <input class="finput" id="achat-search" type="text" placeholder="Chercher ou taper..." oninput="filterAchatDropdown()" onfocus="showAchatDropdown()" autocomplete="off">
    <select class="achat-cat-sel" id="achat-cat">
      ${ACHATS_CATS.map(cat=>`<option>${cat}</option>`).join('')}
    </select>
    <button class="achat-add-btn2" onclick="addAchat()">＋</button>
  </div>
  <div id="achat-dropdown" style="display:none;background:var(--d3);border:1.5px solid var(--g);border-radius:10px;margin-top:-6px;margin-bottom:8px;max-height:140px;overflow-y:auto;"></div>
  <input class="finput" id="achat-name-hidden" type="text" placeholder="Nom de l'article à acheter" style="margin-bottom:10px;">`;

  if(filtered.length===0){
    html+=`<div class="empty"><div class="eico">🛒</div><p>Aucun article dans la liste.<br>Ajoutez ce dont vous avez besoin !</p></div>`;
  } else {
    filtered.forEach((a,i)=>{
      const idx=S.achats.indexOf(a);
      html+=`<div class="achat-card ${a.done?'done':''}">
        <button class="achat-check ${a.done?'checked':''}" onclick="toggleAchat(${idx})">${a.done?'✅':''}</button>
        <div class="achat-info">
          <div class="achat-name" style="${a.done?'text-decoration:line-through':''}">${a.name}</div>
          <div class="achat-cat">${a.cat}${a.qte>1?' · Qté: '+a.qte:''}</div>
        </div>
        <button class="achat-del" onclick="delAchat(${idx})">🗑</button>
      </div>`;
    });
    if(done>0){
      html+=`<button onclick="clearDoneAchats()" style="width:100%;padding:10px;background:none;border:1.5px solid rgba(224,48,48,.3);border-radius:10px;color:var(--red);font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;text-transform:uppercase;cursor:pointer;margin-top:8px;">🗑 Effacer les achetés (${done})</button>`;
    }
  }

  document.getElementById('achats-content').innerHTML=html;
}

function setAchatFilter(f){ achatFilter=f; renderAchats(); }

function filterAchatDropdown(){
  const q=(document.getElementById('achat-search').value||'').toLowerCase();
  const cat=document.getElementById('achat-cat').value;
  const noms=ACHATS_NOMS[cat]||[];
  const filtered=q?noms.filter(n=>n.toLowerCase().startsWith(q)||n.toLowerCase().includes(q)):noms.slice(0,15);
  const dd=document.getElementById('achat-dropdown');
  if(!filtered.length){dd.style.display='none';return;}
  dd.innerHTML=filtered.map(n=>`<div onclick="selectAchatName('${n}')" style="padding:10px 14px;cursor:pointer;font-size:14px;border-bottom:1px solid var(--d4);color:var(--tx);">${n}</div>`).join('');
  dd.style.display='block';
}

function showAchatDropdown(){
  const cat=document.getElementById('achat-cat').value;
  const noms=(ACHATS_NOMS[cat]||[]).slice(0,15);
  const dd=document.getElementById('achat-dropdown');
  dd.innerHTML=noms.map(n=>`<div onclick="selectAchatName('${n}')" style="padding:10px 14px;cursor:pointer;font-size:14px;border-bottom:1px solid var(--d4);color:var(--tx);">${n}</div>`).join('');
  dd.style.display='block';
}

function selectAchatName(name){
  document.getElementById('achat-name-hidden').value=name;
  document.getElementById('achat-search').value=name;
  document.getElementById('achat-dropdown').style.display='none';
}

function addAchat(){
  const name=(document.getElementById('achat-name-hidden').value||document.getElementById('achat-search').value).trim();
  const cat=document.getElementById('achat-cat').value;
  if(!name){toast('⚠️ Saisissez un article');return;}
  if(!S.achats) S.achats=[];
  S.achats.push({id:'a'+Date.now(),name,cat,done:false,qte:1});
  persist(); renderAchats(); toast('✅ Ajouté à la liste');
}

function toggleAchat(idx){
  if(!S.achats[idx]) return;
  S.achats[idx].done=!S.achats[idx].done;
  persist(); renderAchats();
}

function delAchat(idx){
  S.achats.splice(idx,1); persist(); renderAchats();
}

function clearDoneAchats(){
  S.achats=S.achats.filter(a=>!a.done); persist(); renderAchats(); toast('🗑 Liste nettoyée');
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
loadState();
</script>
</body>
</html>
